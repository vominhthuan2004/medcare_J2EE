<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết đơn hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <a th:href="@{/admin/dashboard}" class="btn btn-secondary mb-3">
        ⬅ Quay lại Dashboard
    </a>

    <div class="card shadow-sm p-4">

        <h4 class="mb-3">
            🧾 Đơn hàng #<span th:text="${order.id}"></span>
        </h4>

        <p>
            <b>Khách hàng:</b>
            <span th:text="${order.user != null ? order.user.username : 'N/A'}"></span>
        </p>

        <p>
            <b>Ngày đặt:</b>
            <span th:text="${order.createdAt != null ? #temporals.format(order.createdAt,'dd/MM/yyyy HH:mm') : ''}">
            </span>
        </p>

        <!-- Hiển thị trạng thái -->
        <p>
            <b>Trạng thái hiện tại:</b>
            <span class="badge"
                  th:classappend="${order.status == T(com.example.medcare.model.Order.OrderStatus).DELIVERED} ? 'bg-success' :
                                  (${order.status == T(com.example.medcare.model.Order.OrderStatus).SHIPPING} ? 'bg-primary' : 'bg-secondary')"
                  th:text="${order.status}">
            </span>
        </p>

        <!-- Form cập nhật trạng thái -->
        <form th:action="@{/admin/order/update-status/{id}(id=${order.id})}"
              method="post"
              class="mt-3 mb-4">

            <!-- CSRF đã được disable trong SecurityConfig nên không cần input này -->

            <div class="row g-2 align-items-center">

                <div class="col-auto">
                    <select name="status" class="form-select">

                        <option value="PENDING"
                                th:selected="${order.status == T(com.example.medcare.model.Order.OrderStatus).PENDING}">
                            Chờ xử lý
                        </option>

                        <option value="SHIPPING"
                                th:selected="${order.status == T(com.example.medcare.model.Order.OrderStatus).SHIPPING}">
                            Đang giao
                        </option>

                        <option value="DELIVERED"
                                th:selected="${order.status == T(com.example.medcare.model.Order.OrderStatus).DELIVERED}">
                            Đã giao
                        </option>

                    </select>
                </div>

                <div class="col-auto">
                    <button type="submit" class="btn btn-success">
                        Cập nhật
                    </button>
                </div>

            </div>

        </form>

        <hr>

        <!-- Danh sách sản phẩm -->
        <h5 class="mb-3">📦 Sản phẩm trong đơn</h5>

        <div class="table-responsive">
            <table class="table table-bordered">
                <thead class="table-dark">
                <tr>
                    <th>Sản phẩm</th>
                    <th>Số lượng</th>
                    <th>Giá</th>
                    <th>Tổng</th>
                </tr>
                </thead>
                <tbody>

                <tr th:each="item : ${order.orderItems}">
                    <td th:text="${item.product.name}"></td>
                    <td th:text="${item.quantity}"></td>
                    <td th:text="${#numbers.formatDecimal(item.price,0,'COMMA',0,'POINT')} + ' đ'"></td>
                    <td th:text="${#numbers.formatDecimal(item.price * item.quantity,0,'COMMA',0,'POINT')} + ' đ'"></td>
                </tr>

                <tr th:if="${order.orderItems == null or #lists.isEmpty(order.orderItems)}">
                    <td colspan="4" class="text-center text-muted">
                        Không có sản phẩm
                    </td>
                </tr>

                </tbody>
            </table>
        </div>

        <h5 class="text-end text-danger mt-3">
            Tổng tiền:
            <span th:text="${#numbers.formatDecimal(order.total,0,'COMMA',0,'POINT')} + ' đ'">
            </span>
        </h5>

    </div>

</div>

</body>
</html>
