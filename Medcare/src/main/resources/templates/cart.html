<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng – MedCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family:'Be Vietnam Pro',sans-serif; background:#f0f9ff; color:#23272f; min-height:100vh; }
        .page-header { background:linear-gradient(135deg,#03045e,#0077b6); color:#fff; padding:40px 0 32px; }
        .page-header h1 { font-size:1.8rem; font-weight:800; }
        .back-btn { background:rgba(255,255,255,0.15); color:#fff; border:1px solid rgba(255,255,255,0.3); border-radius:10px; padding:8px 18px; text-decoration:none; font-weight:500; transition:all 0.2s; }
        .back-btn:hover { background:rgba(255,255,255,0.25); color:#fff; }
        .cart-table-card { background:#fff; border-radius:20px; overflow:hidden; box-shadow:0 4px 24px rgba(0,119,182,0.08); border:1px solid #e8f4fd; }
        .cart-table thead { background:linear-gradient(135deg,#03045e,#0077b6); color:#fff; }
        .cart-table thead th { font-weight:600; padding:16px 20px; font-size:0.9rem; border:none; }
        .cart-table tbody tr { border-bottom:1px solid #f1f5f9; transition:background 0.15s; }
        .cart-table tbody tr:hover { background:#f8faff; }
        .cart-table tbody td { padding:16px 20px; vertical-align:middle; border:none; }
        .product-img-sm { width:72px; height:72px; object-fit:cover; border-radius:12px; }
        .product-name-cell { font-weight:600; color:#03045e; }
        .price-cell { color:#e53e3e; font-weight:700; }
        .qty-badge { background:#e0f7fa; color:#0077b6; border-radius:8px; padding:4px 14px; font-weight:700; font-size:0.95rem; }
        .total-cell { color:#059669; font-weight:700; }
        .btn-remove { background:#fef2f2; color:#ef4444; border:1.5px solid #fca5a5; border-radius:10px; padding:6px 14px; font-size:0.85rem; transition:all 0.2s; text-decoration:none; }
        .btn-remove:hover { background:#ef4444; color:#fff; border-color:#ef4444; }
        .summary-card { background:#fff; border-radius:20px; padding:28px; box-shadow:0 4px 24px rgba(0,119,182,0.08); border:1px solid #e8f4fd; }
        .summary-total { font-size:1.4rem; font-weight:800; color:#e53e3e; }
        .btn-checkout { background:linear-gradient(135deg,#059669,#06d6a0); color:#fff; border:none; border-radius:14px; padding:14px 32px; font-size:1rem; font-weight:700; width:100%; transition:all 0.25s; box-shadow:0 6px 20px rgba(6,214,160,0.3); }
        .btn-checkout:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(6,214,160,0.4); }
        .empty-cart { text-align:center; padding:60px 20px; }
        .empty-cart i { font-size:4rem; color:#cbd5e0; }
        .empty-cart p { color:#6c757d; margin-top:16px; font-size:1.05rem; }
        .btn-shop { background:linear-gradient(135deg,#0077b6,#00b4d8); color:#fff; border:none; border-radius:12px; padding:12px 28px; font-weight:600; text-decoration:none; display:inline-block; margin-top:16px; transition:all 0.2s; }
        .btn-shop:hover { transform:translateY(-2px); color:#fff; }
    </style>
</head>
<body>

<div class="page-header">
    <div class="container d-flex align-items-center justify-content-between">
        <h1><i class="fa-solid fa-cart-shopping"></i> Giỏ hàng của bạn</h1>
        <a th:href="@{/products}" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Tiếp tục mua sắm</a>
    </div>
</div>

<div class="container py-5">

    <!-- Giỏ hàng trống -->
    <div th:if="${#lists.isEmpty(cartItems)}" class="empty-cart">
        <i class="fa-solid fa-cart-xmark"></i>
        <p>Giỏ hàng của bạn đang trống!</p>
        <a th:href="@{/products}" class="btn-shop"><i class="fa-solid fa-store"></i> Khám phá sản phẩm</a>
    </div>

    <div th:if="${not #lists.isEmpty(cartItems)}" class="row g-4 align-items-start">
        <!-- BẢNG GIỎ HÀNG -->
        <div class="col-lg-8">
            <div class="cart-table-card">
                <table class="table cart-table mb-0">
                    <thead>
                        <tr>
                            <th>Ảnh</th>
                            <th>Sản phẩm</th>
                            <th class="text-center">Giá</th>
                            <th class="text-center">Số lượng</th>
                            <th class="text-center">Thành tiền</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${cartItems}">
                            <td><img th:src="@{${item.product.imageUrl}}" class="product-img-sm" alt="img" onerror="this.onerror=null;this.src='https://placehold.co/400x400/e2e8f0/64748b?text=Product';"></td>
                            <td class="product-name-cell" th:text="${item.product.name}"></td>
                            <td class="text-center price-cell" th:text="${#numbers.formatDecimal(item.product.price,0,'COMMA',0,'POINT')} + ' đ'"></td>
                            <td class="text-center"><span class="qty-badge" th:text="${item.quantity}"></span></td>
                            <td class="text-center total-cell" th:text="${#numbers.formatDecimal(item.product.price * item.quantity,0,'COMMA',0,'POINT')} + ' đ'"></td>
                            <td class="text-center">
                                <a th:href="@{/cart/remove/{id}(id=${item.product.id})}" class="btn-remove"><i class="fa-solid fa-xmark"></i></a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- TÓM TẮT ĐƠN HÀNG -->
        <div class="col-lg-4">
            <div class="summary-card">
                <h5 style="font-weight:800;color:#03045e;margin-bottom:20px"><i class="fa-solid fa-receipt"></i> Tóm tắt đơn hàng</h5>
                <div class="d-flex justify-content-between mb-2" th:each="item : ${cartItems}">
                    <span style="font-size:0.9rem;color:#4b5563" th:text="${item.product.name} + ' (x' + ${item.quantity} + ')'"></span>
                    <span style="font-size:0.9rem;font-weight:600" th:text="${#numbers.formatDecimal(item.product.price * item.quantity,0,'COMMA',0,'POINT')} + ' đ'"></span>
                </div>
                <hr style="border-color:#e5e7eb;margin:16px 0">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <span style="font-weight:700;color:#23272f">Tổng cộng</span>
                    <span class="summary-total" th:text="${#numbers.formatDecimal(total,0,'COMMA',0,'POINT')} + ' đ'"></span>
                </div>
                <a th:href="@{/cart/checkout}" class="btn-checkout">
                    <i class="fa-solid fa-lock"></i> Thanh toán ngay
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
