<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán – MedCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family:'Be Vietnam Pro',sans-serif; background:#f0f9ff; color:#23272f; min-height:100vh; }
        .page-header { background:linear-gradient(135deg,#03045e,#0077b6); color:#fff; padding:40px 0 32px; }
        .page-header h1 { font-size:1.8rem; font-weight:800; }
        .back-btn { background:rgba(255,255,255,0.15); color:#fff; border:1px solid rgba(255,255,255,0.3); border-radius:10px; padding:8px 18px; text-decoration:none; font-weight:500; transition:all 0.2s; }
        .back-btn:hover { background:rgba(255,255,255,0.25); color:#fff; }

        .form-card { background:#fff; border-radius:20px; padding:32px; box-shadow:0 4px 24px rgba(0,119,182,0.08); border:1px solid #e8f4fd; }
        .form-card h5 { font-size:1.1rem; font-weight:800; color:#03045e; margin-bottom:24px; }
        .form-label { font-weight:600; color:#374151; font-size:0.9rem; margin-bottom:6px; }
        .form-control { border-radius:12px; border:1.5px solid #e2e8f0; padding:12px 16px; font-size:0.95rem; transition:all 0.2s; }
        .form-control:focus { border-color:#00b4d8; box-shadow:0 0 0 3px rgba(0,180,216,0.15); outline:none; }
        .btn-order { background:linear-gradient(135deg,#059669,#06d6a0); color:#fff; border:none; border-radius:14px; padding:14px; font-size:1rem; font-weight:700; width:100%; transition:all 0.25s; box-shadow:0 6px 20px rgba(6,214,160,0.3); margin-top:8px; }
        .btn-order:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(6,214,160,0.4); }

        .summary-card { background:#fff; border-radius:20px; padding:28px; box-shadow:0 4px 24px rgba(0,119,182,0.08); border:1px solid #e8f4fd; }
        .order-item { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #f1f5f9; }
        .order-item:last-of-type { border-bottom:none; }
        .order-item-name { font-size:0.9rem; color:#4b5563; }
        .order-item-total { font-size:0.9rem; font-weight:700; color:#23272f; }
        .grand-total { font-size:1.35rem; font-weight:800; color:#e53e3e; }
        .secure-badge { background:#ecfdf5; border:1px solid #6ee7b7; color:#065f46; border-radius:10px; padding:10px 16px; font-size:0.85rem; margin-top:16px; }
    </style>
</head>
<body>

<div class="page-header">
    <div class="container d-flex align-items-center justify-content-between">
        <h1><i class="fa-solid fa-credit-card"></i> Thanh toán đơn hàng</h1>
        <a th:href="@{/cart}" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Quay lại giỏ hàng</a>
    </div>
</div>

<div class="container py-5">
    <div class="row g-4">
        <!-- FORM THÔNG TIN -->
        <div class="col-lg-7">
            <div class="form-card">
                <h5><i class="fa-solid fa-truck-fast"></i> Thông tin nhận hàng</h5>
                <form th:action="@{/cart/checkout}" method="post">
                    <div class="mb-3">
                        <label class="form-label"><i class="fa-solid fa-user"></i> Họ và tên</label>
                        <input type="text" name="fullName" class="form-control"
                               placeholder="Nhập họ và tên người nhận..." required
                               th:value="${user != null ? user.fullName : ''}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="fa-solid fa-phone"></i> Số điện thoại</label>
                        <input type="text" name="phone" class="form-control"
                               placeholder="Nhập số điện thoại..." required
                               th:value="${user != null ? user.phone : ''}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="fa-solid fa-location-dot"></i> Địa chỉ giao hàng</label>
                        <textarea name="address" class="form-control" rows="3"
                                  placeholder="Nhập địa chỉ giao hàng chi tiết..." required
                                  th:text="${user != null ? user.address : ''}"></textarea>
                    </div>
                    <button type="submit" class="btn-order">
                        <i class="fa-solid fa-check-circle"></i> Xác nhận đặt hàng
                    </button>
                </form>
                <div class="secure-badge mt-3">
                    <i class="fa-solid fa-shield-halved"></i> Thông tin của bạn được bảo mật tuyệt đối. Thanh toán khi nhận hàng (COD).
                </div>
            </div>
        </div>

        <!-- TÓM TẮT -->
        <div class="col-lg-5">
            <div class="summary-card">
                <h5 style="font-weight:800;color:#03045e;margin-bottom:20px"><i class="fa-solid fa-receipt"></i> Đơn hàng của bạn</h5>
                <div th:each="item : ${cartItems}" class="order-item">
                    <span class="order-item-name">
                        <span th:text="${item.product.name}"></span>
                        <span style="color:#9ca3af"> ×<span th:text="${item.quantity}"></span></span>
                    </span>
                    <span class="order-item-total" th:text="${#numbers.formatDecimal(item.product.price * item.quantity,0,'COMMA',0,'POINT')} + ' đ'"></span>
                </div>
                <hr style="margin:16px 0;border-color:#e5e7eb">
                <div class="d-flex justify-content-between align-items-center">
                    <span style="font-weight:700">Tổng cộng</span>
                    <span class="grand-total" th:text="${#numbers.formatDecimal(total,0,'COMMA',0,'POINT')} + ' đ'"></span>
                </div>
                <div style="background:#f0f9ff;border-radius:12px;padding:14px;margin-top:20px;font-size:0.85rem;color:#4b5563">
                    <p style="margin:0"><i class="fa-solid fa-info-circle" style="color:#0077b6"></i> <strong>Thanh toán khi nhận hàng (COD)</strong></p>
                    <p style="margin:4px 0 0;padding-left:20px">Giao hàng trong 2–5 ngày làm việc.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
