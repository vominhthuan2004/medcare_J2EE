<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết đơn hàng – MedCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family:'Be Vietnam Pro',sans-serif; background:#f0f9ff; }
        .page-header { background:linear-gradient(135deg,#03045e,#0077b6); color:#fff; padding:40px 0 32px; }
        .page-header h1 { font-size:1.8rem; font-weight:800; }
        .back-btn { background:rgba(255,255,255,0.15); color:#fff; border:1px solid rgba(255,255,255,0.3); border-radius:10px; padding:8px 18px; text-decoration:none; font-weight:500; }
        .back-btn:hover { background:rgba(255,255,255,0.25); color:#fff; }
        .detail-card { background:#fff; border-radius:20px; padding:28px; box-shadow:0 4px 24px rgba(0,119,182,0.08); border:1px solid #e8f4fd; margin-bottom:20px; }
        .badge-status { padding:6px 16px; border-radius:100px; font-size:0.85rem; font-weight:700; }
        .badge-pending { background:#fef3c7; color:#d97706; }
        .badge-shipping { background:#dbeafe; color:#1d4ed8; }
        .badge-delivered { background:#d1fae5; color:#065f46; }
        .info-row { display:flex; gap:8px; align-items:flex-start; margin-bottom:10px; }
        .info-icon { width:32px; height:32px; background:#e0f7fa; border-radius:8px; display:flex; align-items:center; justify-content:center; color:#0077b6; flex-shrink:0; }
        .info-label { font-size:0.8rem; color:#9ca3af; font-weight:500; }
        .info-value { font-size:0.95rem; font-weight:600; color:#23272f; }
        .items-table thead { background:linear-gradient(135deg,#03045e,#0077b6); color:#fff; }
        .items-table thead th { font-weight:600; padding:14px 18px; border:none; font-size:0.88rem; }
        .items-table tbody td { padding:14px 18px; border-bottom:1px solid #f1f5f9; vertical-align:middle; border-left:none; border-right:none; }
        .total-row { font-size:1.25rem; font-weight:800; color:#e53e3e; }
        .timeline { display:flex; gap:0; margin:8px 0 0; }
        .timeline-step { flex:1; text-align:center; position:relative; }
        .timeline-step:not(:first-child)::before { content:''; position:absolute; top:14px; left:-50%; width:100%; height:2px; background:#e5e7eb; z-index:0; }
        .step-dot { width:28px; height:28px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:0.75rem; position:relative; z-index:1; }
        .step-label { font-size:0.75rem; margin-top:6px; color:#6c757d; }
        .step-active .step-dot { background:linear-gradient(135deg,#0077b6,#00b4d8); color:#fff; }
        .step-active .step-label { color:#0077b6; font-weight:700; }
        .step-done .step-dot { background:#06d6a0; color:#fff; }
        .step-inactive .step-dot { background:#e5e7eb; color:#9ca3af; }
    </style>
</head>
<body>

<div class="page-header">
    <div class="container d-flex align-items-center justify-content-between flex-wrap gap-3">
        <h1><i class="fa-solid fa-receipt"></i> Chi tiết đơn hàng #<span th:text="${order.id}"></span></h1>
        <a th:href="@{/my-orders}" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Đơn hàng của tôi</a>
    </div>
</div>

<div class="container py-5">
    <div class="row g-4">

        <!-- THÔNG TIN ĐƠN HÀNG -->
        <div class="col-lg-4">
            <div class="detail-card">
                <h6 style="font-weight:800;color:#03045e;margin-bottom:20px"><i class="fa-solid fa-circle-info"></i> Thông tin đơn hàng</h6>

                <div class="info-row">
                    <div class="info-icon"><i class="fa-solid fa-user fa-xs"></i></div>
                    <div><div class="info-label">Khách hàng</div><div class="info-value" th:text="${order.user != null ? order.user.username : 'N/A'}"></div></div>
                </div>
                <div class="info-row">
                    <div class="info-icon"><i class="fa-solid fa-user-tie fa-xs"></i></div>
                    <div><div class="info-label">Người nhận</div><div class="info-value" th:text="${order.receiverName}"></div></div>
                </div>
                <div class="info-row">
                    <div class="info-icon"><i class="fa-solid fa-phone fa-xs"></i></div>
                    <div><div class="info-label">Điện thoại</div><div class="info-value" th:text="${order.phone}"></div></div>
                </div>
                <div class="info-row">
                    <div class="info-icon"><i class="fa-solid fa-location-dot fa-xs"></i></div>
                    <div><div class="info-label">Địa chỉ</div><div class="info-value" th:text="${order.address}"></div></div>
                </div>
                <div class="info-row">
                    <div class="info-icon"><i class="fa-regular fa-clock fa-xs"></i></div>
                    <div><div class="info-label">Ngày đặt</div>
                        <div class="info-value" th:text="${order.createdAt != null ? #temporals.format(order.createdAt,'dd/MM/yyyy HH:mm') : ''}"></div>
                    </div>
                </div>
                <div class="mt-3">
                    <span class="badge-status"
                          th:classappend="${order.status.name()=='PENDING'}?'badge-pending':(${order.status.name()=='SHIPPING'}?'badge-shipping':'badge-delivered')"
                          th:text="${order.status.name()=='PENDING'}?'⏳ Chờ xử lý':(${order.status.name()=='SHIPPING'}?'🚚 Đang giao':'✅ Đã giao')">
                    </span>
                </div>

                <!-- TIMELINE -->
                <div class="timeline mt-4">
                    <div th:classappend="${order.status.name()=='PENDING'}?'step-active':'step-done'" class="timeline-step">
                        <div class="step-dot"><i class="fa-solid fa-clock fa-xs"></i></div>
                        <div class="step-label">Đặt hàng</div>
                    </div>
                    <div th:classappend="${order.status.name()=='SHIPPING'}?'step-active':(${order.status.name()=='DELIVERED'}?'step-done':'step-inactive')" class="timeline-step">
                        <div class="step-dot"><i class="fa-solid fa-truck fa-xs"></i></div>
                        <div class="step-label">Đang giao</div>
                    </div>
                    <div th:classappend="${order.status.name()=='DELIVERED'}?'step-done':'step-inactive'" class="timeline-step">
                        <div class="step-dot"><i class="fa-solid fa-check fa-xs"></i></div>
                        <div class="step-label">Đã giao</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- DANH SÁCH SẢN PHẨM -->
        <div class="col-lg-8">
            <div class="detail-card" style="padding:0;overflow:hidden">
                <div style="padding:20px 24px;border-bottom:1px solid #f1f5f9">
                    <h6 style="font-weight:800;color:#03045e;margin:0"><i class="fa-solid fa-box"></i> Sản phẩm trong đơn</h6>
                </div>
                <table class="table items-table mb-0">
                    <thead>
                        <tr>
                            <th>Sản phẩm</th>
                            <th class="text-center">Số lượng</th>
                            <th class="text-center">Đơn giá</th>
                            <th class="text-end">Thành tiền</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${order.orderItems}">
                            <td style="font-weight:600;color:#03045e" th:text="${item.product.name}"></td>
                            <td class="text-center">
                                <span style="background:#e0f7fa;color:#0077b6;border-radius:8px;padding:3px 12px;font-weight:700" th:text="${item.quantity}"></span>
                            </td>
                            <td class="text-center" style="color:#6c757d" th:text="${#numbers.formatDecimal(item.price,0,'COMMA',0,'POINT')} + ' đ'"></td>
                            <td class="text-end" style="font-weight:700;color:#059669" th:text="${#numbers.formatDecimal(item.price * item.quantity,0,'COMMA',0,'POINT')} + ' đ'"></td>
                        </tr>
                        <tr th:if="${order.orderItems == null or #lists.isEmpty(order.orderItems)}">
                            <td colspan="4" class="text-center text-muted py-4">Không có sản phẩm</td>
                        </tr>
                    </tbody>
                </table>
                <div style="padding:16px 24px;border-top:2px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center">
                    <span style="font-weight:700;color:#23272f">Tổng cộng</span>
                    <span class="total-row" th:text="${#numbers.formatDecimal(order.total,0,'COMMA',0,'POINT')} + ' đ'"></span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
