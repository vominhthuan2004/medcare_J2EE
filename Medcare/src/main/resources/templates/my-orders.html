<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử đơn hàng – MedCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family:'Be Vietnam Pro',sans-serif; background:#f0f9ff; }
        .page-header { background:linear-gradient(135deg,#03045e,#0077b6); color:#fff; padding:40px 0 32px; }
        .page-header h1 { font-size:1.8rem; font-weight:800; }
        .back-btn { background:rgba(255,255,255,0.15); color:#fff; border:1px solid rgba(255,255,255,0.3); border-radius:10px; padding:8px 18px; text-decoration:none; font-weight:500; }
        .back-btn:hover { background:rgba(255,255,255,0.25); color:#fff; }
        .order-card { background:#fff; border-radius:16px; padding:22px 26px; box-shadow:0 3px 16px rgba(0,119,182,0.07); border:1px solid #e8f4fd; margin-bottom:16px; display:flex; align-items:center; gap:20px; flex-wrap:wrap; transition:all 0.2s; }
        .order-card:hover { box-shadow:0 8px 28px rgba(0,119,182,0.14); transform:translateY(-2px); }
        .order-id { font-size:1.1rem; font-weight:800; color:#03045e; }
        .order-meta { color:#6c757d; font-size:0.88rem; margin-top:4px; }
        .badge-status { padding:5px 14px; border-radius:100px; font-size:0.8rem; font-weight:700; }
        .badge-pending { background:#fef3c7; color:#d97706; }
        .badge-shipping { background:#dbeafe; color:#1d4ed8; }
        .badge-delivered { background:#d1fae5; color:#065f46; }
        .order-total { font-size:1.2rem; font-weight:800; color:#e53e3e; margin-left:auto; }
        .btn-view { background:linear-gradient(135deg,#0077b6,#00b4d8); color:#fff; border:none; border-radius:10px; padding:9px 20px; font-weight:600; font-size:0.9rem; text-decoration:none; transition:all 0.2s; white-space:nowrap; }
        .btn-view:hover { transform:translateY(-2px); box-shadow:0 6px 18px rgba(0,119,182,0.3); color:#fff; }
        .empty-state { text-align:center; padding:80px 20px; }
        .empty-state i { font-size:4rem; color:#cbd5e0; }
    </style>
</head>
<body>

<div class="page-header">
    <div class="container d-flex align-items-center justify-content-between flex-wrap gap-3">
        <h1><i class="fa-solid fa-box-open"></i> Lịch sử đơn hàng</h1>
        <a th:href="@{/products}" class="back-btn"><i class="fa-solid fa-store"></i> Tiếp tục mua sắm</a>
    </div>
</div>

<div class="container py-5">
    <div th:if="${#lists.isEmpty(orders)}" class="empty-state">
        <i class="fa-solid fa-box-open"></i>
        <p class="mt-3 text-muted" style="font-size:1.05rem">Bạn chưa có đơn hàng nào.</p>
        <a th:href="@{/products}" class="btn btn-primary mt-2 rounded-pill px-4">Mua sắm ngay</a>
    </div>

    <div th:each="order : ${orders}" class="order-card">
        <div>
            <div class="order-id">#<span th:text="${order.id}"></span></div>
            <div class="order-meta">
                <i class="fa-regular fa-clock"></i>
                <span th:text="${#temporals.format(order.createdAt,'dd/MM/yyyy HH:mm')}"></span>
            </div>
        </div>
        <div>
            <span class="badge-status"
                  th:classappend="${order.status.name()=='PENDING'}?'badge-pending':(${order.status.name()=='SHIPPING'}?'badge-shipping':'badge-delivered')"
                  th:text="${order.status.name()=='PENDING'}?'Chờ xử lý':(${order.status.name()=='SHIPPING'}?'Đang giao':'Đã giao')">
            </span>
        </div>
        <div class="order-total" th:text="${#numbers.formatDecimal(order.total,0,'COMMA',0,'POINT')} + ' đ'"></div>
        <a th:href="@{/my-orders/{id}(id=${order.id})}" class="btn-view"><i class="fa-solid fa-eye"></i> Xem chi tiết</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
