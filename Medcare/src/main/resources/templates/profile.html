<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân – MedCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary:#0077b6; --accent:#06d6a0; --dark:#03045e; }
        body { font-family:'Be Vietnam Pro',sans-serif; background:#f0f9ff; color:#23272f; min-height:100vh; display:flex; flex-direction:column; }

        /* NAV */
        .navbar-custom { background:rgba(3,4,94,0.95); backdrop-filter:blur(12px); padding:14px 0; position:sticky; top:0; z-index:1000; box-shadow:0 2px 20px rgba(0,0,0,0.25); }
        .navbar-brand-custom { font-size:1.6rem; font-weight:800; color:#fff!important; text-decoration:none; display:flex; align-items:center; gap:8px; }
        .navbar-brand-custom span { color:#00b4d8; }
        .nav-link-custom { color:rgba(255,255,255,0.85)!important; font-weight:500; padding:8px 14px; border-radius:8px; transition:all 0.2s; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
        .nav-link-custom:hover { background:rgba(255,255,255,0.12); color:#fff!important; }
        .cart-badge { background:#ef4444; color:#fff; border-radius:50%; font-size:0.7rem; padding:2px 6px; margin-left:4px; }

        /* HEADER */
        .page-header { background:linear-gradient(135deg,var(--dark),#0077b6); color:#fff; padding:60px 0 100px; position:relative; overflow:hidden; }
        .page-header::before { content:''; position:absolute; top:-50px; right:-50px; width:300px; height:300px; background:rgba(255,255,255,0.05); border-radius:50%; }
        .page-header h1 { font-size:2.2rem; font-weight:800; position:relative; z-index:10; }

        /* PROFILE CARD */
        .profile-container { margin-top:-60px; position:relative; z-index:20; max-width:700px; width:100%; margin-left:auto; margin-right:auto; margin-bottom:60px; }
        .profile-card { background:#fff; border-radius:24px; box-shadow:0 10px 40px rgba(0,119,182,0.1); border:1px solid #e8f4fd; overflow:hidden; }
        
        .profile-header-card { background:linear-gradient(135deg,#e0f2fe,#f0f9ff); padding:40px 30px 30px; text-align:center; border-bottom:1px solid #e8f4fd; position:relative; }
        .avatar-wrap { width:100px; height:100px; background:linear-gradient(135deg,#0077b6,#00b4d8); color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2.5rem; margin:0 auto 16px; border:4px solid #fff; box-shadow:0 8px 20px rgba(0,119,182,0.2); }
        .user-name { font-size:1.5rem; font-weight:800; color:#03045e; margin:0; }
        .user-role { font-size:0.95rem; color:#64748b; font-weight:600; margin-top:4px; display:inline-block; padding:4px 12px; background:#f1f5f9; border-radius:100px; }

        .profile-body { padding:40px 30px; }
        
        .form-label { font-weight:700; color:#334155; font-size:0.9rem; margin-bottom:8px; }
        .form-control { border:2px solid #e2e8f0; border-radius:12px; padding:12px 16px; font-size:1rem; transition:all 0.2s; background:#f8fafc; }
        .form-control:focus { border-color:#00b4d8; background:#fff; box-shadow:0 0 0 4px rgba(0,180,216,0.1); outline:none; }
        .form-control:disabled { background:#f1f5f9; color:#94a3b8; cursor:not-allowed; border-color:#e2e8f0; }
        
        .input-group-text { background:#f8fafc; border:2px solid #e2e8f0; border-right:none; border-radius:12px 0 0 12px; color:#64748b; }
        .form-control.with-icon { border-left:none; padding-left:0; border-radius:0 12px 12px 0; }
        .form-control.with-icon:focus { border-left:none; box-shadow:none; }
        .input-group:focus-within .input-group-text, .input-group:focus-within .with-icon { border-color:#00b4d8; background:#fff; }
        .input-group:focus-within .input-group-text { color:#00b4d8; box-shadow:-4px 0 0 0 rgba(0,180,216,0.1), 0 -4px 0 0 rgba(0,180,216,0.1), 0 4px 0 0 rgba(0,180,216,0.1); }
        .input-group:focus-within .with-icon { box-shadow:4px 0 0 0 rgba(0,180,216,0.1), 0 -4px 0 0 rgba(0,180,216,0.1), 0 4px 0 0 rgba(0,180,216,0.1); }

        .btn-save { background:linear-gradient(135deg,#0077b6,#00b4d8); color:#fff; border:none; border-radius:12px; padding:14px; font-weight:700; font-size:1.05rem; width:100%; transition:all 0.3s; margin-top:10px; box-shadow:0 8px 24px rgba(0,119,182,0.25); }
        .btn-save:hover { transform:translateY(-3px); box-shadow:0 12px 30px rgba(0,119,182,0.35); }

        .alert-success-custom { background:#d1fae5; border:1px solid #34d399; color:#065f46; border-radius:12px; padding:16px; font-weight:600; display:flex; align-items:center; gap:12px; margin-bottom:24px; animation:slideDown 0.4s ease-out; }
        @keyframes slideDown {
            from { opacity:0; transform:translateY(-10px); }
            to { opacity:1; transform:translateY(0); }
        }

        /* FOOTER */
        .footer { background:var(--dark); color:rgba(255,255,255,0.7); padding:40px 0; margin-top:auto; text-align:center; }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar-custom">
    <div class="container d-flex align-items-center justify-content-between flex-wrap gap-3">
        <a class="navbar-brand-custom" th:href="@{/}"><i class="fa-solid fa-heart-pulse"></i> Med<span>Care</span></a>
        <div class="d-flex align-items-center flex-wrap gap-2">
            <a th:href="@{/}" class="nav-link-custom"><i class="fa-solid fa-house"></i> Trang chủ</a>
            <a th:href="@{/dashboard}" class="nav-link-custom"><i class="fa-solid fa-chart-line"></i> Sức khoẻ</a>
            <a th:href="@{/products}" class="nav-link-custom"><i class="fa-solid fa-capsules"></i> Thực phẩm</a>
            <div sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/admin/dashboard}" class="nav-link-custom" style="color:#f87171!important"><i class="fa-solid fa-gauge-high"></i> Admin</a>
            </div>
            <a th:href="@{/cart}" class="nav-link-custom">
                <i class="fa-solid fa-cart-shopping"></i><span class="cart-badge" th:text="${cartCount ?: 0}">0</span>
            </a>
            <div th:if="${#authorization.expression('isAuthenticated()')}" class="d-flex align-items-center gap-2">
                <span class="nav-link-custom" style="color:#00b4d8!important"><i class="fa-solid fa-user-circle"></i> <span th:text="${#authentication.name}"></span></span>
                <a th:href="@{/my-orders}" class="nav-link-custom"><i class="fa-solid fa-box"></i></a>
                <form th:action="@{/logout}" method="post" style="margin:0">
                    <button class="nav-link-custom" style="background:none;border:none;color:#f87171!important;cursor:pointer"><i class="fa-solid fa-right-from-bracket"></i></button>
                </form>
            </div>
        </div>
    </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
    <div class="container text-center">
        <h1>Hồ sơ cá nhân</h1>
    </div>
</div>

<div class="container profile-container">
    <div class="profile-card">
        <div class="profile-header-card">
            <div class="avatar-wrap">
                <i class="fa-regular fa-user"></i>
            </div>
            <h2 class="user-name" th:text="${user.fullName ?: user.username}">Nguyễn Văn A</h2>
            <div class="user-role" th:text="${user.role == 'ROLE_ADMIN' ? 'Quản trị viên' : 'Thành viên MedCare'}">Role</div>
        </div>

        <div class="profile-body">
            <div th:if="${param.success}" class="alert-success-custom">
                <i class="fa-solid fa-circle-check" style="font-size:1.5rem"></i>
                <div>Tuyệt vời! Thông tin cá nhân của bạn đã được cập nhật thành công.</div>
            </div>

            <form th:action="@{/profile/update}" method="POST">
                
                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <label class="form-label">Tên đăng nhập</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-user-shield"></i></span>
                            <input type="text" class="form-control with-icon" th:value="${user.username}" disabled>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Họ và tên</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-id-card"></i></span>
                            <input type="text" class="form-control with-icon" name="fullName" th:value="${user.fullName}" required placeholder="Nhập họ và tên đầy đủ...">
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Số điện thoại liên lạc</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-phone"></i></span>
                        <input type="text" class="form-control with-icon" name="phone" th:value="${user.phone}" required placeholder="Ví dụ: 0912345678...">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Địa chỉ nhận hàng mặc định</label>
                    <div class="input-group">
                        <span class="input-group-text align-items-start pt-3"><i class="fa-solid fa-map-location-dot"></i></span>
                        <textarea class="form-control with-icon" name="address" rows="3" required placeholder="Nhập địa chỉ chi tiết (số nhà, đường, quận/huyện, tỉnh/thành phố)..." th:text="${user.address}"></textarea>
                    </div>
                </div>

                <button type="submit" class="btn-save">
                    <i class="fa-solid fa-floppy-disk me-2"></i> Lưu thay đổi
                </button>
            </form>
        </div>
    </div>
</div>

<!-- FOOTER -->
<footer class="footer">
    <p>© 2026 <strong style="color:#00b4d8">MedCare</strong> – Chăm sóc sức khoẻ toàn diện</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
