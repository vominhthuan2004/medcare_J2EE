<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký – MedCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #064e3b 0%, #059669 60%, #06d6a0 100%);
            display: flex; align-items: center; justify-content: center; padding: 24px;
        }
        .auth-card {
            background: #fff; border-radius: 24px; padding: 48px 40px;
            width: 100%; max-width: 440px;
            box-shadow: 0 24px 60px rgba(6,78,59,0.25);
        }
        .auth-logo { text-align: center; margin-bottom: 28px; }
        .auth-logo .icon {
            width: 64px; height: 64px; background: linear-gradient(135deg,#059669,#06d6a0);
            border-radius: 18px; display: inline-flex; align-items: center; justify-content: center;
            font-size: 1.8rem; color: #fff; margin-bottom: 14px;
            box-shadow: 0 8px 20px rgba(6,214,160,0.35);
        }
        .auth-logo h2 { font-size: 1.7rem; font-weight: 800; color: #064e3b; }
        .auth-logo p { color: #6c757d; font-size: 0.95rem; margin-top: 4px; }
        .form-label { font-weight: 600; color: #2d3748; font-size: 0.9rem; margin-bottom: 6px; }
        .form-control {
            border-radius: 12px; border: 1.5px solid #e2e8f0;
            padding: 12px 16px; font-size: 0.95rem; transition: all 0.2s;
        }
        .form-control:focus { border-color: #06d6a0; box-shadow: 0 0 0 3px rgba(6,214,160,0.15); }
        .btn-auth {
            background: linear-gradient(135deg, #059669, #06d6a0);
            color: #fff; border: none; border-radius: 12px;
            padding: 13px; font-weight: 700; font-size: 1rem;
            width: 100%; transition: all 0.25s; margin-top: 8px;
            box-shadow: 0 6px 20px rgba(6,214,160,0.3);
        }
        .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(6,214,160,0.4); }
        .alert-error {
            background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c;
            border-radius: 12px; padding: 12px 16px; font-size: 0.9rem; margin-bottom: 20px;
        }
        .divider { text-align: center; color: #9ca3af; font-size: 0.85rem; margin: 20px 0; position: relative; }
        .divider::before, .divider::after { content:''; position: absolute; top: 50%; width: 40%; height: 1px; background: #e5e7eb; }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .link-login { text-align: center; margin-top: 18px; font-size: 0.9rem; color: #6c757d; }
        .link-login a { color: #059669; font-weight: 600; text-decoration: none; }
        .link-login a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="auth-card">
    <div class="auth-logo">
        <div class="icon"><i class="fa-solid fa-user-plus"></i></div>
        <h2>Tạo tài khoản mới</h2>
        <p>Bắt đầu hành trình sống khoẻ cùng MedCare</p>
    </div>

    <div class="alert-error" th:if="${error}">
        <i class="fa-solid fa-circle-exclamation"></i> <span th:text="${error}"></span>
    </div>

    <form th:action="@{/register}" method="post">
        <div class="mb-3">
            <label class="form-label"><i class="fa-solid fa-user"></i> Tên đăng nhập</label>
            <input type="text" name="username" class="form-control" placeholder="Nhập tên đăng nhập..." required>
        </div>
        <div class="mb-3">
            <label class="form-label"><i class="fa-solid fa-lock"></i> Mật khẩu</label>
            <input type="password" name="password" id="password" class="form-control" placeholder="Nhập mật khẩu (tối thiểu 6 ký tự)..." required>
        </div>
        <div class="mb-3">
            <label class="form-label"><i class="fa-solid fa-lock"></i> Nhập lại mật khẩu</label>
            <input type="password" name="confirmPassword" id="confirmPassword" class="form-control" placeholder="Nhập lại mật khẩu..." required>
            <div id="confirmError" style="color:#b91c1c; font-size:0.85rem; margin-top:6px; display:none;">
                <i class="fa-solid fa-circle-exclamation"></i> Mật khẩu nhập lại không khớp!
            </div>
        </div>
        <button type="submit" class="btn-auth">
            <i class="fa-solid fa-user-check"></i> Đăng ký tài khoản
        </button>
    </form>

    <div class="divider">hoặc</div>
    <div class="link-login">
        Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a>
    </div>
</div>
<script>
    document.querySelector('form').addEventListener('submit', function(e) {
        const pw = document.getElementById('password').value;
        const cpw = document.getElementById('confirmPassword').value;
        const errEl = document.getElementById('confirmError');
        const cpwInput = document.getElementById('confirmPassword');
        if (pw !== cpw) {
            e.preventDefault();
            errEl.style.display = 'block';
            cpwInput.style.borderColor = '#f87171';
            cpwInput.focus();
        } else {
            errEl.style.display = 'none';
            cpwInput.style.borderColor = '#e2e8f0';
        }
    });
    document.getElementById('confirmPassword').addEventListener('input', function() {
        const pw = document.getElementById('password').value;
        const errEl = document.getElementById('confirmError');
        if (this.value === pw) {
            errEl.style.display = 'none';
            this.style.borderColor = '#06d6a0';
        } else if (this.value.length > 0) {
            errEl.style.display = 'block';
            this.style.borderColor = '#f87171';
        }
    });
</script>
</body>
</html>
