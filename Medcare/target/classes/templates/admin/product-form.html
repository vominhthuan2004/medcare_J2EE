<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm / Sửa sản phẩm – MedCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family:'Be Vietnam Pro',sans-serif; background:#f0f9ff; }
        .page-header { background:linear-gradient(135deg,#03045e,#0077b6); color:#fff; padding:36px 0 28px; }
        .page-header h1 { font-size:1.7rem; font-weight:800; }
        .back-btn { background:rgba(255,255,255,0.15); color:#fff; border:1px solid rgba(255,255,255,0.3); border-radius:10px; padding:8px 18px; text-decoration:none; font-weight:500; }
        .back-btn:hover { background:rgba(255,255,255,0.25); color:#fff; }
        .form-card { background:#fff; border-radius:20px; padding:36px; box-shadow:0 4px 24px rgba(0,119,182,0.08); border:1px solid #e8f4fd; }
        .form-label { font-weight:600; color:#374151; font-size:0.9rem; margin-bottom:6px; }
        .form-control, .form-select { border-radius:12px; border:1.5px solid #e2e8f0; padding:12px 16px; font-size:0.95rem; transition:all 0.2s; }
        .form-control:focus, .form-select:focus { border-color:#00b4d8; box-shadow:0 0 0 3px rgba(0,180,216,0.15); outline:none; }
        .btn-save { background:linear-gradient(135deg,#059669,#06d6a0); color:#fff; border:none; border-radius:12px; padding:13px 32px; font-weight:700; transition:all 0.25s; box-shadow:0 6px 20px rgba(6,214,160,0.3); }
        .btn-save:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(6,214,160,0.4); }
        .btn-back { background:#f3f4f6; color:#374151; border:none; border-radius:12px; padding:13px 24px; font-weight:600; transition:all 0.2s; text-decoration:none; }
        .btn-back:hover { background:#e5e7eb; color:#23272f; }
        .img-preview { width:140px; height:140px; object-fit:cover; border-radius:16px; border:2px solid #e2e8f0; }
    </style>
</head>
<body>

<div class="page-header">
    <div class="container d-flex align-items-center justify-content-between flex-wrap gap-3">
        <h1><span th:text="${product.id == null ? '➕ Thêm sản phẩm mới' : '✏️ Chỉnh sửa sản phẩm'}"></span></h1>
        <a th:href="@{/admin/products}" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Danh sách sản phẩm</a>
    </div>
</div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="form-card">
                <form th:action="@{/admin/products/save}" method="post" th:object="${product}" enctype="multipart/form-data">
                    <input type="hidden" th:field="*{id}">

                    <div class="mb-4">
                        <label class="form-label"><i class="fa-solid fa-tag"></i> Tên sản phẩm</label>
                        <input type="text" class="form-control" th:field="*{name}" placeholder="Nhập tên sản phẩm..." required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label"><i class="fa-solid fa-align-left"></i> Mô tả</label>
                        <textarea class="form-control" th:field="*{description}" rows="4" placeholder="Nhập mô tả sản phẩm..."></textarea>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label"><i class="fa-solid fa-money-bill"></i> Giá (VNĐ)</label>
                            <input type="number" class="form-control" th:field="*{price}" placeholder="0" required min="0">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label"><i class="fa-solid fa-boxes-stacked"></i> Tồn kho</label>
                            <input type="number" class="form-control" th:field="*{stock}" placeholder="0" required min="0">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label"><i class="fa-solid fa-image"></i> Ảnh sản phẩm</label>
                        <input type="file" name="imageFile" class="form-control" accept="image/*">
                    </div>

                    <div class="mb-4" th:if="${product.imageUrl != null and !product.imageUrl.isEmpty()}">
                        <label class="form-label">Ảnh hiện tại</label><br>
                        <img th:src="@{${product.imageUrl}}" class="img-preview" alt="Ảnh hiện tại">
                    </div>

                    <div class="d-flex gap-3">
                        <button type="submit" class="btn-save"><i class="fa-solid fa-floppy-disk"></i> Lưu sản phẩm</button>
                        <a th:href="@{/admin/products}" class="btn-back"><i class="fa-solid fa-xmark"></i> Hủy</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
