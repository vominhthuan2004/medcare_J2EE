<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập – MedCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #03045e 0%, #0077b6 60%, #00b4d8 100%);
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
        }
        .auth-card {
            background: #fff; border-radius: 24px; padding: 48px 40px;
            width: 100%; max-width: 440px;
            box-shadow: 0 24px 60px rgba(3,4,94,0.25);
        }
        .auth-logo { text-align: center; margin-bottom: 28px; }
        .auth-logo .icon {
            width: 64px; height: 64px; background: linear-gradient(135deg,#0077b6,#00b4d8);
            border-radius: 18px; display: inline-flex; align-items: center; justify-content: center;
            font-size: 1.8rem; color: #fff; margin-bottom: 14px;
            box-shadow: 0 8px 20px rgba(0,119,182,0.35);
        }
        .auth-logo h2 { font-size: 1.7rem; font-weight: 800; color: #03045e; }
        .auth-logo p { color: #6c757d; font-size: 0.95rem; margin-top: 4px; }
        .form-label { font-weight: 600; color: #2d3748; font-size: 0.9rem; margin-bottom: 6px; }
        .form-control {
            border-radius: 12px; border: 1.5px solid #e2e8f0;
            padding: 12px 16px; font-size: 0.95rem; transition: all 0.2s;
        }
        .form-control:focus { border-color: #00b4d8; box-shadow: 0 0 0 3px rgba(0,180,216,0.15); }
        .input-group .form-control { border-radius: 12px 0 0 12px; }
        .btn-auth {
            background: linear-gradient(135deg, #0077b6, #00b4d8);
            color: #fff; border: none; border-radius: 12px;
            padding: 13px; font-weight: 700; font-size: 1rem;
            width: 100%; transition: all 0.25s; margin-top: 8px;
            box-shadow: 0 6px 20px rgba(0,119,182,0.3);
        }
        .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(0,119,182,0.4); }
        .alert-error {
            background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c;
            border-radius: 12px; padding: 12px 16px; font-size: 0.9rem; margin-bottom: 20px;
        }
        .divider { text-align: center; color: #9ca3af; font-size: 0.85rem; margin: 20px 0; position: relative; }
        .divider::before, .divider::after { content:''; position: absolute; top: 50%; width: 40%; height: 1px; background: #e5e7eb; }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .link-register { text-align: center; margin-top: 18px; font-size: 0.9rem; color: #6c757d; }
        .link-register a { color: #0077b6; font-weight: 600; text-decoration: none; }
        .link-register a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="auth-card">
    <div class="auth-logo">
        <div class="icon"><i class="fa-solid fa-heart-pulse"></i></div>
        <h2>Chào mừng trở lại!</h2>
        <p>Đăng nhập để tiếp tục hành trình khoẻ mạnh</p>
    </div>

    <div class="alert-error" th:if="${param.error}">
        <i class="fa-solid fa-circle-exclamation"></i> Tên đăng nhập hoặc mật khẩu không đúng.
    </div>
    <div th:if="${param.logout}" style="background:#ecfdf5;border:1px solid #6ee7b7;color:#065f46;border-radius:12px;padding:12px 16px;margin-bottom:20px;font-size:0.9rem">
        <i class="fa-solid fa-check-circle"></i> Đăng xuất thành công!
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label"><i class="fa-solid fa-user"></i> Tên đăng nhập</label>
            <input type="text" name="username" class="form-control" placeholder="Nhập tên đăng nhập..." required>
        </div>
        <div class="mb-3">
            <label class="form-label"><i class="fa-solid fa-lock"></i> Mật khẩu</label>
            <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu..." required>
        </div>
        <button type="submit" class="btn-auth">
            <i class="fa-solid fa-right-to-bracket"></i> Đăng nhập
        </button>
    </form>

    <div class="divider">hoặc</div>
    <div class="link-register">
        Chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a>
    </div>
</div>
</body>
</html>
